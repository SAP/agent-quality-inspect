name: Unit Tests

permissions:
  contents: read

on:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: [macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements_test.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=agent_inspect python -m pytest --cov=agent_inspect --cov-report=term-missing --cov-report=xml tests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        if: always()
